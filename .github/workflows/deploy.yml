name: Deploy to physiq/jump

on:
  push:
    branches: [main]

concurrency:
  group: physiq-hub-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout physiq-jump
        uses: actions/checkout@v4

      - name: Checkout physiq hub
        uses: actions/checkout@v4
        with:
          repository: physiodevapp/physiq
          token: ${{ secrets.PHYSIQ_DEPLOY_TOKEN }}
          path: physiq-hub

      - name: Copy files to hub
        run: |
          rm -rf physiq-hub/jump
          mkdir -p physiq-hub/jump
          cp index.html sw.js manifest.json physiq-hub/jump/
          [ -f favicon.svg ] && cp favicon.svg physiq-hub/jump/ || true
          [ -f .nojekyll ] && cp .nojekyll physiq-hub/jump/ || true
          [ -d icons ] && mkdir -p physiq-hub/jump/icons && cp icons/*.png physiq-hub/jump/icons/ || true
          [ -d lib ] && mkdir -p physiq-hub/jump/lib && cp lib/*.js physiq-hub/jump/lib/ || true

      - name: Commit and push
        working-directory: physiq-hub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A jump/
          git diff --cached --quiet || git commit -m "chore: update jump from physiq-jump@${{ github.sha }}"
          for i in 1 2 4 8; do
            git push && break
            echo "Push rejected, retrying in ${i}s..."
            sleep $i
            git pull --rebase origin main
          done
